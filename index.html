    // ========== TOTAL DE PREGUNTAS CARGADAS ==========
    
    // ========== FUNCIÓN PARA MEZCLAR PREGUNTAS ALEATORIAMENTE ==========
    function mezclarPreguntas(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Mezclamos las preguntas para que cada vez que se abra el archivo sea diferente
    mezclarPreguntas(preguntas);

    // Reordenamos los IDs para que sigan correlativos (opcional, pero queda más prolijo)
    preguntas.forEach((p, index) => {
        p.id = index + 1;
    });

    // ---------- Estado de la aplicación ----------
    let currentIndex = 0;
    let userAnswers = new Array(410).fill(null);
    let answerStatus = new Array(410).fill(false);
    let scoreCorrect = 0;
    let scoreIncorrect = 0;

    const cuerpoQuiz = document.getElementById('cuerpoQuiz');
    const barraProgreso = document.getElementById('barraProgreso');
    const textoContador = document.getElementById('textoContador');
    const puntajeDisplay = document.getElementById('puntajeDisplay');

    function renderPregunta() {
        const q = preguntas[currentIndex];
        const isAnswered = answerStatus[currentIndex];
        const selectedIdx = userAnswers[currentIndex];
        const isCorrect = (selectedIdx !== null && selectedIdx === q.correcta);

        let html = `<div class="pregunta-texto">${currentIndex+1}. ${q.pregunta}</div>`;
        html += `<div class="opciones-area" id="opcionesArea">`;

        q.opciones.forEach((opt, idx) => {
            let cls = "opcion-boton";
            if (isAnswered) {
                if (idx === q.correcta) cls += " correcta";
                else if (idx === selectedIdx && selectedIdx !== q.correcta) cls += " incorrecta";
            }
            let prefix = q.tipo === "vf" ? "" : String.fromCharCode(65+idx) + ". ";
            html += `<button class="${cls}" data-opt-index="${idx}" ${isAnswered ? 'disabled' : ''}>${prefix}${opt}</button>`;
        });

        html += `</div>`;

        if (isAnswered) {
            const correctaTexto = q.opciones[q.correcta];
            if (isCorrect) {
                html += `<div class="retro-card"><div class="retro-titulo-correcto">✅ Correcto</div><div class="retro-detalle"><strong>${correctaTexto}</strong><br>${q.exp}</div></div>`;
            } else {
                const elegidaTexto = (selectedIdx!==null) ? q.opciones[selectedIdx] : '';
                html += `<div class="retro-card"><div class="retro-titulo-incorrecto">❌ Incorrecto</div><div class="retro-detalle">Respuesta correcta: <strong>${correctaTexto}</strong><br><span style="opacity:0.7">Elegiste: ${elegidaTexto}</span><br><br>${q.exp}</div></div>`;
            }
        }

        html += `<div class="navegacion">`;
        html += `<button class="btn btn-sec" id="prevBtn" ${currentIndex===0?'disabled':''}>⮜ Anterior</button>`;
        html += `<span class="indice-preg">${currentIndex+1} / 410</span>`;
        html += `<button class="btn" id="nextBtn" ${currentIndex===409?'disabled':''}>Siguiente ⮞</button>`;
        html += `</div>`;
        html += `<div class="separador"></div>`;
        html += `<div style="display:flex; justify-content:center;"><button class="btn reset-btn" id="resetBtn">↺ Reiniciar respuestas</button></div>`;

        cuerpoQuiz.innerHTML = html;

        document.querySelectorAll('.opcion-boton').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerStatus[currentIndex]) return;
                const optIdx = parseInt(btn.dataset.optIndex);
                handleAnswer(currentIndex, optIdx);
            });
        });

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderPregunta();
                actualizarProgreso();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex < 409) {
                currentIndex++;
                renderPregunta();
                actualizarProgreso();
            }
        });
        document.getElementById('resetBtn')?.addEventListener('click', resetRespuestas);
    }

    function handleAnswer(index, optIdx) {
        if (answerStatus[index]) return;
        answerStatus[index] = true;
        userAnswers[index] = optIdx;
        if (optIdx === preguntas[index].correcta) {
            scoreCorrect++;
        } else {
            scoreIncorrect++;
        }
        actualizarPuntaje();
        renderPregunta();
        actualizarProgreso();
    }

    function actualizarPuntaje() {
        puntajeDisplay.innerText = `✅ ${scoreCorrect}  ·  ❌ ${scoreIncorrect}`;
    }

    function actualizarProgreso() {
        const respondidas = answerStatus.filter(v => v === true).length;
        const porcentaje = (respondidas / 410) * 100;
        barraProgreso.style.width = porcentaje + '%';
        textoContador.innerText = `Pregunta ${currentIndex+1} / 410`;
    }

    function resetRespuestas() {
        if (confirm("¿Reiniciar todas las respuestas?")) {
            userAnswers = new Array(410).fill(null);
            answerStatus = new Array(410).fill(false);
            scoreCorrect = 0;
            scoreIncorrect = 0;
            currentIndex = 0;
            actualizarPuntaje();
            renderPregunta();
            actualizarProgreso();
        }
    }

    // Iniciar
    renderPregunta();
    actualizarProgreso();

})();
</script>
